name: Cloudflare Pages Deploy - Xlooop

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - dev
          - test

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Xlooop to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify deployment posture
        run: node scripts/verify-cloud-deployment-readiness.mjs

      - name: Verify Access and entitlement evidence
        run: node scripts/verify-cloudflare-access-evidence.mjs

      - name: Verify test.xlooop.com Cloudflare Access protection
        if: ${{ inputs.environment == 'test' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/verify-cloudflare-access-remote.mjs --env=test

      - name: Prepare Cloudflare Pages bundle
        run: node scripts/prepare-cloudflare-pages.mjs --env=${{ inputs.environment }}

      - name: Select Cloudflare Pages project
        id: project
        shell: bash
        run: |
          if [[ "${{ inputs.environment }}" == "dev" ]]; then
            echo "name=${{ vars.CLOUDFLARE_PAGES_PROJECT_XLOOOP_DEV }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ vars.CLOUDFLARE_PAGES_PROJECT_XLOOOP_TEST }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-cloudflare --project-name=${{ steps.project.outputs.name }} --branch=${{ inputs.environment }}
