name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Cwd anchor
        run: node scripts/cwd-anchor.mjs
        env: { XLOOP_CI: 'true' }

      - name: Smoke (static)
        run: node scripts/smoke-cli.mjs

      - name: Inventory
        run: node scripts/inventory-gen.mjs

      - name: Repo schema (P10B.4 freshness gate)
        run: |
          node scripts/repo-schema-gen.mjs --check || (
            echo "✗ docs/REPO-SCHEMA.{md,yaml} stale. Run \`node scripts/repo-schema-gen.mjs\` and commit." &&
            exit 1
          )

      - name: Agent navigability (7-question schema test)
        run: node --test tests/smoke/agent-navigability.test.mjs

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run e2e suite
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report.json
            test-results/playwright-report/
          retention-days: 14
