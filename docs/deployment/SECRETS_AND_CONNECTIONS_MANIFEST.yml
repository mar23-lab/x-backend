# docs/deployment/SECRETS_AND_CONNECTIONS_MANIFEST.yml
#
# The missing inventory (drift/production-readiness-ssot-260610): "what cannot
# you see?" — the prod worker (xlooop-api) runs on 19 live secrets + 2 native
# bindings + out-of-band dashboard config, none of which had a names-only
# inventory. This file is that inventory.
#
# SECRET POLICY (enforced by scripts/verify-production-readiness-state.mjs check (a)):
#   names + where-it-lives + verify command ONLY; NEVER a secret value.
#   No sk-… / eyJ… / long-hex value may appear in this file.
#
# Each connections[] entry carries:
#   id            — the secret/binding/connection name
#   kind          — worker_secret | worker_var | local_file | dashboard_config | native_binding
#   where_it_lives— how/where it is provisioned (a command or location, never a value)
#   verify_cmd    — the offline-safe command that proves presence (never prints a value)
#   required_by   — the doc/file that consumes or mandates it
#   out_of_band   — true where provisioned outside wrangler.toml / this repo (dashboard, ~/)

schema_id: xlooop.secrets_and_connections_manifest.v1
secret_policy: "names + where-it-lives + verify command only; NEVER a secret value"
worker: xlooop-api
config: wrangler.toml

connections:
  # ── 19 live worker secrets (confirmed via `wrangler secret list`) ────────────
  - id: ACTIVITY_DEFAULT_WORKSPACE
    kind: worker_secret
    where_it_lives: "wrangler secret put ACTIVITY_DEFAULT_WORKSPACE (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep ACTIVITY_DEFAULT_WORKSPACE"
    required_by: src/workers/routes/activity-ingest.ts

  - id: ACTIVITY_INGEST_TOKEN
    kind: worker_secret
    where_it_lives: "wrangler secret put ACTIVITY_INGEST_TOKEN (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep ACTIVITY_INGEST_TOKEN"
    required_by: src/workers/routes/activity-ingest.ts

  - id: ADMIN_USER_IDS
    kind: worker_secret
    where_it_lives: "wrangler secret put ADMIN_USER_IDS (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep ADMIN_USER_IDS"
    required_by: wrangler.toml ([vars] comment · R40 admin Clerk user_ids, comma-separated)

  - id: ANTHROPIC_API_KEY
    kind: worker_secret
    where_it_lives: "wrangler secret put ANTHROPIC_API_KEY (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep ANTHROPIC_API_KEY"
    required_by: AGENTS.md / xcp-chat-bridge

  - id: MODEL_RUNTIME_ENC_KEY
    kind: worker_secret
    where_it_lives: "wrangler secret put MODEL_RUNTIME_ENC_KEY (xlooop-api) — base64 of 32 random bytes: openssl rand -base64 32"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep MODEL_RUNTIME_ENC_KEY"
    required_by: Wave C model-runtimes (encrypts customer provider credentials at rest; absent → credential writes 503, fail-closed)

  - id: CLERK_JWKS_URL
    kind: worker_secret
    where_it_lives: "wrangler secret put CLERK_JWKS_URL (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep CLERK_JWKS_URL"
    required_by: AUTH_TENANCY_MODEL.md §4 (explicit JWKS URL · overrides derivation)

  - id: CLERK_PUBLISHABLE_KEY
    kind: worker_secret
    where_it_lives: "wrangler secret put CLERK_PUBLISHABLE_KEY (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep CLERK_PUBLISHABLE_KEY"
    required_by: AUTH_TENANCY_MODEL.md §4 (Clerk publishable key · JWKS URL derivation)

  - id: CLERK_SECRET_KEY
    kind: worker_secret
    where_it_lives: "wrangler secret put CLERK_SECRET_KEY (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep CLERK_SECRET_KEY"
    required_by: AUTH_TENANCY_MODEL.md §4 (Clerk server-side API key)

  - id: CUSTOMER_AUTO_PROVISION_APPROVER_USER_ID
    kind: worker_secret
    where_it_lives: "wrangler secret put CUSTOMER_AUTO_PROVISION_APPROVER_USER_ID (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep CUSTOMER_AUTO_PROVISION_APPROVER_USER_ID"
    required_by: src/workers/routes/session.ts (audited operator/system approver for Clerk-org session auto-provision)

  - id: DATABASE_URL
    kind: worker_secret
    where_it_lives: "wrangler secret put DATABASE_URL (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep DATABASE_URL"
    required_by: DATABASE_SCHEMA_V1.md (Neon Postgres connection URL · HTTPS-compatible)

  - id: GITHUB_WEBHOOK_DEFAULT_WORKSPACE
    kind: worker_secret
    where_it_lives: "wrangler secret put GITHUB_WEBHOOK_DEFAULT_WORKSPACE (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep GITHUB_WEBHOOK_DEFAULT_WORKSPACE"
    required_by: src/workers/routes/github-webhook.ts

  - id: GITHUB_WEBHOOK_REPO_MAP
    kind: worker_secret
    where_it_lives: "wrangler secret put GITHUB_WEBHOOK_REPO_MAP (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep GITHUB_WEBHOOK_REPO_MAP"
    required_by: src/workers/routes/github-webhook.ts

  - id: GITHUB_WEBHOOK_SECRET
    kind: worker_secret
    where_it_lives: "wrangler secret put GITHUB_WEBHOOK_SECRET (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep GITHUB_WEBHOOK_SECRET"
    required_by: src/workers/routes/github-webhook.ts (HMAC signature verify)

  - id: MBP_LIVE_STREAM_INGEST_TOKEN
    kind: worker_secret
    where_it_lives: "wrangler secret put MBP_LIVE_STREAM_INGEST_TOKEN (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep MBP_LIVE_STREAM_INGEST_TOKEN"
    required_by: src/workers/routes/mbp-live-stream.ts

  - id: MBP_OPERATOR_WORKSPACE_ID
    kind: worker_secret
    where_it_lives: "wrangler secret put MBP_OPERATOR_WORKSPACE_ID (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep MBP_OPERATOR_WORKSPACE_ID"
    required_by: src/workers/routes/mbp-projection.ts

  - id: MBP_OPERATOR_WORKSPACE_NAME
    kind: worker_secret
    where_it_lives: "wrangler secret put MBP_OPERATOR_WORKSPACE_NAME (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep MBP_OPERATOR_WORKSPACE_NAME"
    required_by: src/workers/routes/mbp-projection.ts

  - id: MBP_OPERATOR_WORKSPACE_SLUG
    kind: worker_secret
    where_it_lives: "wrangler secret put MBP_OPERATOR_WORKSPACE_SLUG (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep MBP_OPERATOR_WORKSPACE_SLUG"
    required_by: src/workers/routes/mbp-projection.ts

  - id: MBP_OWNER_LINKED_USER_IDS
    kind: worker_secret
    where_it_lives: "wrangler secret put MBP_OWNER_LINKED_USER_IDS (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep MBP_OWNER_LINKED_USER_IDS"
    required_by: src/workers/routes/mbp-projection.ts (R43.7 owner-linked identities)

  - id: MBP_OWNER_USER_ID
    kind: worker_secret
    where_it_lives: "wrangler secret put MBP_OWNER_USER_ID (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep MBP_OWNER_USER_ID"
    required_by: wrangler.toml ([vars] comment · R43.7 platform-operator Clerk user_id)

  - id: CUSTOMER_AUTO_PROVISION_FROM_CLERK_ORG
    kind: worker_var
    where_it_lives: "wrangler.toml [vars] or Cloudflare Worker variable (xlooop-api)"
    verify_cmd: "wrangler deployments view --config wrangler.toml --json | grep CUSTOMER_AUTO_PROVISION_FROM_CLERK_ORG"
    required_by: src/workers/routes/session.ts (enables first-session provisioning for operator-created Clerk orgs)

  - id: PITCH_DECK_URL
    kind: worker_secret
    where_it_lives: "wrangler secret put PITCH_DECK_URL (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep PITCH_DECK_URL"
    required_by: src/workers/routes/investor.ts

  - id: PITCH_DECK_VERSION
    kind: worker_secret
    where_it_lives: "wrangler secret put PITCH_DECK_VERSION (xlooop-api)"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep PITCH_DECK_VERSION"
    required_by: src/workers/routes/investor.ts

  # ── Worker secret · Turnstile bot-protection (IMP-03 260615; operator-provisioned when the public signup funnel is live) ──
  - id: TURNSTILE_SECRET
    kind: worker_secret
    where_it_lives: "wrangler secret put TURNSTILE_SECRET (xlooop-api) — operator provisions when the x-web Turnstile widget goes live"
    verify_cmd: "wrangler secret list --config wrangler.toml | grep TURNSTILE_SECRET"
    required_by: src/workers/routes/request-access.ts · src/workers/services/turnstile.ts (server-side Turnstile verification on the public signup funnel)

  # ── Native platform bindings (NO API keys/secrets · provisioned in wrangler.toml) ──
  - id: AI
    kind: native_binding
    where_it_lives: "wrangler.toml [ai] binding = \"AI\" (Cloudflare Workers AI · env.AI)"
    verify_cmd: "grep -A1 '^\\[ai\\]' wrangler.toml | grep 'binding = \"AI\"'"
    required_by: services/agent-digest.ts (buildWorkspaceDigestLLM · governed digest agent)

  - id: EMAIL
    kind: native_binding
    where_it_lives: "wrangler.toml [[send_email]] name = \"EMAIL\" (Cloudflare Email Service)"
    verify_cmd: "grep -A1 '^\\[\\[send_email\\]\\]' wrangler.toml | grep 'name = \"EMAIL\"'"
    required_by: services/email-notifier.ts (R55 transactional admin notifications)

  # ── ANTHROPIC_API_KEY also lives as a local file (out-of-band) ───────────────
  # The "what cannot you see?" gap was precisely the absence of THIS row: the
  # same key is BOTH a worker secret (above) AND an on-disk operator file.
  - id: ANTHROPIC_API_KEY
    kind: local_file
    where_it_lives: "~/.anthropic/api_key (operator workstation file)"
    verify_cmd: "test -s ~/.anthropic/api_key && echo present"
    required_by: AGENTS.md / xcp-chat-bridge
    out_of_band: true

  # ── Out-of-band operator/CI credentials · Cloudflare dashboard origin, consumed as env (IMP-03 260615) ──
  - id: CLOUDFLARE_API_TOKEN
    kind: dashboard_config
    where_it_lives: "Cloudflare dashboard → My Profile → API Tokens (create/rotate); consumed as a GitHub Actions repo secret + operator shell env var CLOUDFLARE_API_TOKEN by deploy/provision scripts — NOT a worker runtime secret"
    verify_cmd: "test -n \"$CLOUDFLARE_API_TOKEN\" && echo present  # value-free; SoT = Cloudflare dashboard API Tokens"
    required_by: deployment/cloudflare/environments.json · scripts/provision-feedback-d1-cloudflare.mjs · scripts/provision-cloudflare-pages-access.mjs · scripts/verify-cloudflare-access-remote.mjs
    out_of_band: true

  - id: CLOUDFLARE_ACCESS_CLIENT_SECRET
    kind: dashboard_config
    where_it_lives: "Cloudflare dashboard → Zero Trust → Access → Service Tokens (create/rotate the token pair); consumed as operator shell env var CLOUDFLARE_ACCESS_CLIENT_SECRET by paid-pilot/customer-feedback evidence scripts — paired with the public CLOUDFLARE_ACCESS_CLIENT_ID"
    verify_cmd: "test -n \"$CLOUDFLARE_ACCESS_CLIENT_SECRET\" && echo present  # value-free; SoT = Cloudflare Zero Trust Access Service Tokens"
    required_by: scripts/write-paid-pilot-boundary-receipt.mjs · scripts/write-customer-feedback-production-boundary-receipt.mjs · scripts/verify-feedback-cloud-smoke.mjs · docs/runbooks/paid-pilot-strict-evidence-runbook.md
    out_of_band: true

  # ── Out-of-band dashboard config (Cloudflare dashboard · not in this repo) ───
  - id: notify.xlooop.com
    kind: dashboard_config
    where_it_lives: "Cloudflare dashboard → Compute & AI → Email Service → Email Sending → Onboard Domain (notify.xlooop.com · SPF/DKIM only, no MX)"
    verify_cmd: "wrangler email sending list 2>/dev/null | grep notify.xlooop.com  # dashboard is SoT"
    required_by: wrangler.toml [vars] EMAIL_FROM_ADDRESS = \"alerts@notify.xlooop.com\" · services/email-notifier.ts
    out_of_band: true
