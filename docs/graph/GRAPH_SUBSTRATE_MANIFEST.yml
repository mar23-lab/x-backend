# status MUST follow the census (the verifier enforces persisted_graph_nodes==0 => wired_not_fed):
#   wired_not_fed   — code + tables exist but the persisted graph is empty (no rebuild / empty sources)
#   partially_fed   — core nodes fed (events/projects/lenses) but a `lineage`-role table is still empty
#   fed             — every core AND lineage source has data + the persisted graph reflects it
status: partially_fed
