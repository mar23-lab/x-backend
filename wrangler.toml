# pre-flight was green (executor commit deployed-ancestor + MBP_OWNER_USER_ID secret set); Wave 2.2
# chat enqueue + the OS-5 W2 approve->post consumer are both live. Rollback = set "disabled" +
# redeploy (next cron run is inert; EXECUTOR_ACTIVATION_RUNBOOK.md section 3).
EXECUTOR_MODE = "enabled"
# Phase 2 magic-link (Wave R-I.7 Stage C · 2026-05-29 · operator-confirmed dashboard config done).
