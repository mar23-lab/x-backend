# wrangler.toml · API Worker (api.xlooop.com)
#
# Separate from wrangler.jsonc (which configures the Pages deployment).
# This config deploys the backend REST API at api.xlooop.com.
#
# Per BACKEND_ADR_001.md · API_CONTRACT_V1.md · AUTH_TENANCY_MODEL.md
#
# Deploy:  npm run deploy:api
# Dev:     npm run dev:api

name = "xlooop-api"
main = "src/workers/index.ts"
compatibility_date = "2026-05-26"
compatibility_flags = ["nodejs_compat"]

# Pre-deploy safety gate (260719): refuse to ship code that is ahead of the prod
# DB schema. Runs before EVERY `wrangler deploy` (even a raw one), so it cannot be
# skipped the way a bare `wrangler deploy` skipped `npm run deploy:api`. It binds
# the existing scripts/verify-prod-migrations.mjs; DATABASE_URL unset -> advisory
# skip (dev/CI safe); placeholder or behind-DB -> abort. Override (audited):
# DEPLOY_MIGRATION_GATE_BYPASS=1.
[build]
command = "node scripts/predeploy-migration-gate.mjs"

# Preserve dashboard-set vars/secrets across `wrangler deploy`. Without this (default false),
# a deploy DELETES any variable set only in the dashboard and not in this file — e.g. the
# operator-flipped CUSTOMER_INAPP_READINESS_GATE / CUSTOMER_AUTO_PROVISION_* (Parts M/O). keep_vars
# makes deploys additive: this file's [vars] win for keys it declares; dashboard-only keys survive.
keep_vars = true

# Production route binding · api.xlooop.com → xlooop-api
# Custom domain provisioned via Cloudflare Dashboard 2026-05-26.
# Custom domains use the bare hostname (no path glob — wrangler rejects /* here).
[[routes]]
pattern = "api.xlooop.com"
zone_name = "xlooop.com"
custom_domain = true

# R49 PR-5+6 · Cron Trigger · propagation worker tick.
# Fires every 5 minutes (Cloudflare's minimum free-tier cron granularity).
# Each tick reads new events + matches against active propagation rules + writes
# pending recommendations. See src/workers/index.ts scheduledHandler.
#
# R51-ζ-2 · Self-maintenance cron triggers per §16.5.
#
# Wave ν (2026-05-28 · post-deploy-attempt) · CRITICAL Cloudflare Workers
# account-plan limit: max 5 cron triggers per worker. Original Wave ζ
# shipped 7; first wrangler-deploy returned "code: 10072 · limit of 5
# cron triggers". Consolidated by chaining daily loops into shared slots.
#
# J-E TASK 1 (2026-07-19) · DEAD-CRON FIX. This comment PREVIOUSLY claimed the 04:00/05:00 slots ran
# pattern_suspend/shadow_eval — but the composites actually ran purge_deleted/review_schedule, and
# pattern_suspend/shadow_eval carried their OWN registry expressions ("30 4 * * *" / "15 5 * * *") that
# were NEVER in this [triggers] array. scheduledHandler dispatches ONLY via CRON_BY_EXPRESSION[event.cron]
# and Cloudflare only sends declared expressions, so §16.5 loops 3+6 NEVER fired autonomously. Fixed by
# genuinely chaining them into the existing daily slots (crons/index.ts) — NOT by adding a 7th/8th trigger
# (the account cap forbids it, and an undeclared expression itself never fires). CRON_REGISTRY now has
# EXACTLY the 6 expressions below — a 1:1 match with this array, guarded by cron-registry-wrangler-parity.test.
#   - 04:00 slot: threshold_retune + purge_deleted + pattern_suspend (§16.5 loops 2 & 3)
#   - 05:00 slot: calibration_retrain + review_schedule + shadow_eval + customer_census (§16.5 loops 5 & 6)
[triggers]
crons = [
  "*/5 * * * *",   # propagation_tick (5min)
  "0 * * * *",     # permanent_suppress + graph_rebuild (hourly · ARCH-004 chained graph_rebuild into this slot — it FEEDS the data-graph substrate; see crons/index.ts permanentSuppressThenGraphRebuild)
  "0 4 * * *",     # threshold_retune + purge_deleted + pattern_suspend (daily 04:00 UTC · see thresholdRetuneThenPurgeThenPatternSuspend)
  "0 5 * * *",     # calibration_retrain + review_schedule + shadow_eval + customer_census (daily 05:00 UTC · see calibrationRetrainThenReviewThenShadowEvalThenCensus)
  "0 3 * * 1",     # weight_retune (weekly Mon 03:00 UTC)
  "45 * * * *",    # reclassify_unattributed — PR #517 self-heal backstop (hourly :45 · flag-gated RECLASSIFY_CRON_ENABLED, default OFF)
]

# R55 (2026-06-07) · Cloudflare Email Service — transactional admin notifications (in-ecosystem,
# native binding, NO API keys/secrets). Sends from EMAIL_FROM_ADDRESS on an Email-Sending-onboarded
# domain. Onboard once (dashboard → Compute & AI → Email Service → Email Sending → Onboard Domain,
# or `wrangler email sending enable <domain>`): this adds SPF/DKIM only — never MX — so Google
# Workspace / Gmail receiving is unaffected. Consumed by services/email-notifier.ts.
[[send_email]]
name = "EMAIL"

# R56 Stage 1 · public-surface hardening — strict per-IP rate-limit on the unauthenticated
# signup funnel (POST /api/v1/request-access, 5/min/IP). The rateLimit() middleware
# (src/workers/middleware/rate-limit.ts) uses an in-isolate fallback bucket until these bindings are
# provisioned. ACTIVATED (Wave M-B, 260719): the three [[ratelimit]] blocks below make limiting
# GLOBAL (distributed across CF's edge) instead of per-isolate. CF rate-limit namespace_id is a
# self-chosen integer namespace (NOT a pre-allocated resource) — 2001/2002/2003 are the SIGNUP /
# CHAT / READINESS lanes. Wired in src/workers/index.ts (:181 request-access -> SIGNUP, unconditional;
# :249 customer-chat -> CHAT and :250 readiness/* -> READINESS, both gated by SAFETY_FLOOR_RATELIMIT_ENABLED).
# SYNTAX: the rate-limit binding is declared via [[unsafe.bindings]] with type = "ratelimit" — the exact
# shape documented in src/workers/middleware/rate-limit.ts (the consuming code). The bare top-level
# [[ratelimit]] form the earlier draft used is NOT recognised by wrangler 4.x (dry-run: "Unexpected
# fields found in top-level field: ratelimit" and the binding never appears) — corrected Wave M-B 260719.
[[unsafe.bindings]]
name = "RATE_LIMITER_SIGNUP"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

# customer-chat per-user cap (60/min) — gated by SAFETY_FLOOR_RATELIMIT_ENABLED (index.ts:249).
[[unsafe.bindings]]
name = "RATE_LIMITER_CHAT"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 60, period = 60 }

# readiness/* per-user cap (10/min, the LLM-cost lane) — gated by SAFETY_FLOOR_RATELIMIT_ENABLED (index.ts:250).
[[unsafe.bindings]]
name = "RATE_LIMITER_READINESS"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 10, period = 60 }

# Stage 3.5 (2026-06-08) · Cloudflare Workers AI — powers the LLM-richer governed digest agent
# (services/agent-digest.ts buildWorkspaceDigestLLM). Native platform binding, NO API keys/secrets;
# Cloudflare provides the inference (free-tier neuron allowance). Safe-by-default: the LLM draft is
# still posted as a PENDING proposal the operator approves, and a missing/failing binding falls back
# to the deterministic digest. Consumed via env.AI.
[ai]
binding = "AI"

# Non-secret build/runtime config (secrets set via `wrangler secret put`)
[vars]
ENVIRONMENT = "production"
