# 0 rows, idempotent). Order at deploy: (1) apply 075 to prod, (2) this flag, (3) wrangler deploy.
SINGLE_INTAKE_ENABLED = "true"
CLERK_JWKS_CACHE_TTL_SECONDS = "300"
ALLOWED_ORIGIN_PATTERN = "https://*.xlooop.com"
LOG_LEVEL = "info"
