# chat/digest/enrich paths WRITE context_packets + skill_invocation_receipts (mig 070/071, applied)
# - the "what the agent knew per governed run" audit rows. Additive, shadow-observability only.
CONTEXT_PACKET_PERSISTENCE_ENABLED = "true"
# W4/G2 · operator-owned org ids — connectors auto-approve the operator-approval side for these
# (the operator IS the authority for their own workspaces). Customer orgs are NOT listed → they
# require explicit operator approval (POST /admin/customer/:id/approve). Non-secret identifiers.
OPERATOR_WORKSPACE_IDS = "org_3EG82VEzc8t3t65XSZ0YDlcaDMI,org_3EIO8YYcUTtjOQ9d1i7eh8mvBFv"
# Self-driving weekly digest sweep (services/scheduled-digest-sweep.ts, chained into the weekly
# weight_retune cron). Default OFF — deploying the worker is INERT until this flips. Two-stage
# safety: the agent code can ship unactivated. Set "true" to activate the self-driving sweep, in
# which case the agent PROACTIVELY drafts one PENDING digest proposal per active workspace each week
# (lands in the notifications bell → operator one-tap approves; the sweep never auto-posts). Flip via
# redeploy of api with this var = "true", OR `wrangler secret put DIGEST_SWEEP_ENABLED` / dashboard
# env var (no redeploy). Governed + idempotent + never-throws by construction.
# ACTIVATED 2026-06-08 (operator decision: self-driving moat ON). The weekly weight_retune cron
# (Mon 03:00 UTC) now sweeps the operator's active workspaces and drafts one PENDING digest proposal
# each into the bell for one-tap approval. Set back to "false" to deactivate.
DIGEST_SWEEP_ENABLED = "true"
# Self-healing reclassification backstop (crons/reclassify-unattributed.ts · the backstop to the
# going-forward producer PR #517). Default OFF — deploying the worker is INERT until this flips.
# When "true", the hourly :45 cron RE-FILES the unattributed backlog (project_id NULL or the
# '%-allactivity' catch-all) into the 8 bodies-of-work projects using the SAME classifier, but ONLY
# within workspaces that opted into the split (have a project with metadata.origin =
# allactivity_split_260609) and ONLY into projects that already exist (FK-safe). Bounded to 500
# events/run; idempotent; never-throws. Flip via redeploy with this var = "true", OR
# `wrangler secret put RECLASSIFY_CRON_ENABLED` / dashboard env var (no redeploy). PROD IS
# OPERATOR-ENABLED (ON): the operator flipped this to "true" earlier (self-heal backstop active).
# The hourly :45 cron RE-FILES the unattributed backlog into existing split projects (FK-safe,
# bounded 500/run, idempotent). Rollback = set "false" + redeploy.
RECLASSIFY_CRON_ENABLED = "true"

# SF-2 (260711) · per-user rate-limit on the LLM-cost endpoints (customer-chat 60/min, readiness/*
# 10/min). Gate for the rateLimitWhenFlag() middleware at index.ts:249-250 (OFF => byte-identical,
# no limiter registered). ACTIVATED (Wave M-B, 260719) together with the [[ratelimit]] RATE_LIMITER_CHAT
# / RATE_LIMITER_READINESS bindings above — the flag is inert without them, and they are inert without
# the flag. Rollback = set "false" + redeploy (limiter unregisters, behaviour byte-identical).
SAFETY_FLOOR_RATELIMIT_ENABLED = "true"
# J-E Wave (260719, PR #16) - OBSERVE-only tenant sterility census, chained into the daily 05:00 slot.
# Mig 083 applied to prod (workers_schema_version=83, RLS + xlooop_app grants verified) BEFORE this
