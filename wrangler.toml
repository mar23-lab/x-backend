CUSTOMER_CENSUS_ENABLED = "true"
# OS-3 UX Wave-2.1 · the execution-pipeline executor (services/operations-queue-consumer.ts, chained
# into the hourly :45 reclassify slot). Default OFF ("disabled") — deploying the worker is INERT: the
# executor makes ZERO DB calls until this flips. The keystone trust fix: WRITE-mode chat actions log
# operation_events status='queued' but nothing ran them ("proceed did nothing"). When "enabled", the
# hourly cron DRAINS the operator's queued events — atomically claims each (queued→running, run-
# exactly-once), runs the named `execute:<verb>` (e.g. execute:digest), and writes the result back as
# a GOVERNED proposal (needs_review/pending — never auto-posts). Governed + run-exactly-once + never-
# throws by construction. Flip via redeploy with this var = "enabled", OR `wrangler secret put
